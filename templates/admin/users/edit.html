{% extends "admin/layout.html" %}

{% block page_title %}

Edit User

{% endblock %}

{% block content %}

<div class="max-w-3xl mx-auto space-y-8">

    <!-- Header -->

    <div class="bg-white rounded-3xl border border-slate-200 p-8">

        <h1 class="text-3xl font-black text-slate-900">

            Edit User

        </h1>

        <p class="text-slate-500 mt-2">

            Perbarui informasi akun pengguna.

        </p>

    </div>

    <!-- Form -->

    <form
        method="POST"
        class="bg-white rounded-3xl border border-slate-200 p-8 space-y-6">

        <!-- Username -->

        <div>

            <label class="block mb-2 font-semibold text-slate-700">

                Username

            </label>

            <input
                type="text"
                name="username"
                value="{{ user.username }}"
                required
                class="w-full rounded-2xl border border-slate-300 px-5 py-3 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">

        </div>

        <!-- Email -->

        <div>

            <label class="block mb-2 font-semibold text-slate-700">

                Email

            </label>

            <input
                type="email"
                name="email"
                value="{{ user.email }}"
                required
                class="w-full rounded-2xl border border-slate-300 px-5 py-3 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">

        </div>

        <!-- Role -->

        <div>

            <label class="block mb-2 font-semibold text-slate-700">

                Role

            </label>

            <select
                name="role"
                class="w-full rounded-2xl border border-slate-300 px-5 py-3 focus:ring-2 focus:ring-emerald-500">

                <option
                    value="Admin"
                    {% if user.role=="Admin" %}selected{% endif %}>

                    Admin

                </option>

                <option
                    value="User"
                    {% if user.role=="User" %}selected{% endif %}>

                    User

                </option>

            </select>

        </div>

        <!-- Button -->

        <div class="flex justify-end gap-3 pt-4">

            <a
                href="{{ url_for('admin.manage_users') }}"
                class="px-6 py-3 rounded-2xl border border-slate-300 hover:bg-slate-100 font-semibold">

                Batal

            </a>

            <button
                type="submit"
                class="px-8 py-3 rounded-2xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold">

                Simpan Perubahan

            </button>

        </div>

    </form>

</div>

{% endblock %}
